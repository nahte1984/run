<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動眼睛煙火特效 - 超大禮花動態星空版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');

        let renderer, scene, camera, material, mesh, cameraTexture;
        
        let leftEyeRaw = new THREE.Vector2(0.5, 0.5);
        let rightEyeRaw = new THREE.Vector2(0.5, 0.5);
        let hasFace = false;

        let videoWidth = 1280;
        let videoHeight = 720;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform vec2 u_videoResolution;
            uniform float iTime;
            uniform vec2 u_leftEyeRaw;   
            uniform vec2 u_rightEyeRaw;  
            uniform float u_hasFace;  
            varying vec2 vUv;

            #define S(x,y,z) smoothstep(x,y,z)
            #define B(x,y,z,w) S(x-z, x+z, w)*S(y+z, y-z, w)
            #define saturate(x) clamp(x,0.,1.)

            #define NUM_EXPLOSIONS 4.
            // 保持粒子的豐盈度
            #define NUM_PARTICLES 55.

            // --- 引入的 3D Gradient Noise 函數與工具 ---
            vec3 hash( vec3 p ) 
            {
                p = vec3( dot(p,vec3(127.1,311.7, 74.7)),
                          dot(p,vec3(269.5,183.3,246.1)),
                          dot(p,vec3(113.5,271.9,124.6)));

                return -1.0 + 2.0*fract(sin(p)*43758.5453123);
            }

            float noise( in vec3 p )
            {
                vec3 i = floor( p );
                vec3 f = fract( p );
                vec3 u = f*f*(3.0-2.0*f);

                return mix( mix( mix( dot( hash( i + vec3(0.0,0.0,0.0) ), f - vec3(0.0,0.0,0.0) ), 
                                      dot( hash( i + vec3(1.0,0.0,0.0) ), f - vec3(1.0,0.0,0.0) ), u.x),
                                 mix( dot( hash( i + vec3(0.0,1.0,0.0) ), f - vec3(0.0,1.0,0.0) ), 
                                      dot( hash( i + vec3(1.0,1.0,0.0) ), f - vec3(1.0,1.0,0.0) ), u.x), u.y),
