<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whenever i see u | v7.0 (Fire Background & Heart Eyes)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');

        let renderer, scene, camera, material, mesh, cameraTexture;
        
        let leftEyeRaw = new THREE.Vector2(0.5, 0.5);
        let rightEyeRaw = new THREE.Vector2(0.5, 0.5);
        let hasFace = false;

        let videoWidth = 1280;
        let videoHeight = 720;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform vec2 u_videoResolution;
            uniform float iTime;
            uniform vec2 u_leftEyeRaw;   
            uniform vec2 u_rightEyeRaw;  
            uniform float u_hasFace;  
            varying vec2 vUv;

            #define PI      3.141592653589793
            #define TWO_PI  6.283185307179586

            // ==========================================
            // 火焰背景設定 (Fire Background Parameters)
            // ==========================================
            #define ANIMATION_SPEED 1.5
            #define MOVEMENT_SPEED 1.0
            #define MOVEMENT_DIRECTION vec2(0.7, -1.0)
            #define PARTICLE_SIZE 0.009
            #define PARTICLE_SCALE (vec2(0.5, 1.6))
            #define PARTICLE_SCALE_VAR (vec2(0.25, 0.2))
            #define PARTICLE_BLOOM_SCALE (vec2(0.5, 0.8))
            #define PARTICLE_BLOOM_SCALE_VAR (vec2(0.3, 0.1))
            #define SPARK_COLOR vec3(1.0, 0.4, 0.05) * 1.5
            #define BLOOM_COLOR vec3(1.0, 0.4, 0.05) * 0.8
            #define SMOKE_COLOR vec3(1.0, 0.43, 0.1) * 0.8
            #define SIZE_MOD 1.05
            #define ALPHA_MOD 0.9
            #define LAYERS_COUNT 15

            // --- 火焰所需的 Hash 與 Noise 演算法 (已為你補齊) ---
            float hash1_2(in vec2 p) {
                vec3 p3  = fract(vec3(p.xyx) * .1031);
                p3 += dot(p3, p3.yzx + 33.33);
                return fract((p3.x + p3.y) * p3.z);
            }

            vec2 hash2_2(vec2 p) {
                vec3 p3 = fract(vec3(p.xyx) * vec3(.1031, .1030, .0973));
                p3 += dot(p3, p3.yzx+33.33);
                return fract((p3.xx+p3.yz)*p3.zy);
            }

            float noise1_2(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f*f*(3.0-2.0*f);
                return mix(mix(hash1_2(i + vec2(0.0,0.0)), hash1_2(i + vec2(1.0,0.0)), u.x),
                           mix(hash1_2(i + vec2(0.0,1.0)), hash1_2(i + vec2(1.0,1.0)), u.x), u.y);
            }

            vec2 noise2_2(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f*f*(3.0-2.0*f);
                return mix(mix(hash2_2(i + vec2(0.0,0.0)), hash2_2(i + vec2(1.0,0.0)), u.x),
                           mix(hash2_2(i + vec2(0.0,1.0)), hash2_2(i + vec2(1.0,1.0)), u.x), u.y);
            }

            // --- 火焰粒子渲染 ---
            float layeredNoise1_2(in vec2 uv, in float sizeMod, in float alphaMod, in int layers, in float animation) {
                float noise = 0.0;
                float alpha = 1.0;
                float size = 1.0;
                vec2 offset = vec2(0.0);
                for (int i = 0; i < 15; i++) {
                    if(i >= layers) break; // WebGL 相容性寫法
                    offset += hash2_2(vec2(alpha, size)) * 10.0;
                    noise += noise1_2(uv * size + iTime * animation * 8.0 * MOVEMENT_DIRECTION * MOVEMENT_SPEED + offset) * alpha;
                    alpha *= alphaMod;
                    size *= sizeMod;
                }
                noise *= (1.0 - alphaMod)/(1.0 - pow(alphaMod, float(layers)));
                return noise;
            }

            vec2 rotate(in vec2 point, in float deg) {
                float s = sin(deg);
                float c = cos(deg);
                return mat2(s, c, -c, s) * point;
            }

            vec2 voronoiPointFromRoot(in vec2 root, in float deg) {
                vec2 point = hash2_2(root) - 0.5;
                float s = sin(deg);
                float c = cos(deg);
                point = mat2(s, c, -c, s) * point * 0.66;
                point += root + 0.5;
                return point;
            }

            float degFromRootUV(in vec2 uv) {
                return iTime * ANIMATION_SPEED * (hash1_2(uv) - 0.5) * 2.0;  
            }

            vec2 randomAround2_2(in vec2 point, in vec2 range, in vec2 uv) {
                return point + (hash2_2(uv) - 0.5) * range;
            }

            vec3 fireParticles(in vec2 uv, in vec2 originalUV) {
                vec3 particles = vec3(0.0);
                vec2 rootUV = floor(uv);
                float deg = degFromRootUV(rootUV);
                vec2 pointUV = voronoiPointFromRoot(rootUV, deg);
                float dist = 2.0;
                float distBloom = 0.0;
               
                vec2 tempUV = uv + (noise2_2(uv * 2.0) - 0.5) * 0.1;
                tempUV += -(noise2_2(uv * 3.0 + iTime) - 0.5) * 0.07;

                dist = length(rotate(tempUV - pointUV, 0.7) * randomAround2_2(PARTICLE_SCALE, PARTICLE_SCALE_VAR, rootUV));
                distBloom = length(rotate(tempUV - pointUV, 0.7) * randomAround2_2(PARTICLE_BLOOM_SCALE, PARTICLE_BLOOM_SCALE_VAR, rootUV));

                particles += (1.0 - smoothstep(PARTICLE_SIZE * 0.6, PARTICLE_SIZE * 3.0, dist)) * SPARK_COLOR;
                particles += pow((1.0 - smoothstep(0.0, PARTICLE_SIZE * 6.0, distBloom)) * 1.0, 3.0) * BLOOM_COLOR;

                float border = (hash1_2(rootUV) - 0.5) * 2.0;
                float disappear = 1.0 - smoothstep(border, border + 0.5, originalUV.y);
                
                border = (hash1_2(rootUV + 0.214) - 1.8) * 0.7;
                float appear = smoothstep(border, border + 0.4, originalUV.y);
                
                return particles * disappear * appear;
            }

            vec3 layeredParticles(in vec2 uv, in float sizeMod, in float alphaMod, in int layers, in float smoke) { 
                vec3 particles = vec3(0.0);
                float size = 1.0;
                float alpha = 1.0;
                vec2 offset = vec2(0.0);
                vec2 noiseOffset;
                vec2 bokehUV;
                
                for (int i = 0; i < 15; i++) {
                    if(i >= layers) break; // WebGL 相容性寫法
                    noiseOffset = (noise2_2(uv * size * 2.0 + 0.5) - 0.5) * 0.15;
                    bokehUV = (uv * size + iTime * MOVEMENT_DIRECTION * MOVEMENT_SPEED) + offset + noiseOffset; 
                    particles += fireParticles(bokehUV, uv) * alpha * (1.0 - smoothstep(0.0, 1.0, smoke) * (float(i) / float(layers)));
                    offset += hash2_2(vec2(alpha, alpha)) * 10.0;
                    alpha *= alphaMod;
                    size *= sizeMod;
                }
                return particles;
            }

            // ==========================================
            // 愛心煙火設定 (Heart Fireworks Functions)
            // ==========================================
            float star5SDF( vec2 p, float r, float m){
                const vec2 k1 = vec2(0.809016994375, -0.587785252292);
                const vec2 k2 = vec2(-k1.x,k1.y);
                p.x = abs(p.x);
                p -= 2.0*max(dot(k1,p),0.0)*k1;
                p -= 2.0*max(dot(k2,p),0.0)*k2;
                p.x = abs(p.x);
                p.y -= r;
                vec2 ab = m*vec2(-k1.y,k1.x) - vec2(0,r); 
                float h = clamp( dot(p,ab)/dot(ab,ab), 0.0, 1.0 );
                return length(p-ab*h) * sign(p.y*ab.x-p.x*ab.y);
            }

            float hash1(float p){
                p = fract(p * .1031*9811.164);  
                p *= p + 33.33; 
                p *= p + p;
                return fract(p);
            }

            vec3 colorRibbon(float t){
                return abs(mod(vec3(0.,1.,2.)/3. + t, 1.) - .5) * 4. - 0.5;
            }

            vec2 getHeartPosition(float t){
                return vec2(16.0 * sin(t) * sin(t) * sin(t), -(13.0 * cos(t) - 5.0 * cos(2.0*t)- 2.0 * cos(3.0*t) - cos(4.0*t)));
            }

            vec3 renderHeartFireworks(vec2 scaled_uv, vec2 center, float timeOffset) {
                float t = (iTime * 0.35) + timeOffset; 
                vec3 color = vec3(0.);
                
                const float jmax = 3.0; 
                const float imax = 20.0; 
                
                float dist = length(scaled_uv - center);
                if(dist > 1.8) return vec3(0.0);

                for(float j=0.; j<jmax; j++){
                    float ja = j/jmax;
                    float local_t = t - hash1(ja*33.669) * 2.0; 
                    float t1 = floor(local_t); 
                    float t2fb = fract(local_t); 
                    
                    float flasht = t2fb * (step(0.0, t2fb) - step(0.1, t2fb)) * 10.;
                    vec3 col = colorRibbon(hash1(ja + t1)); 
                    
                    for(float i=0.; i<imax; i++){ 
                        float ia = i/imax;
                        float randOffset = (hash1(ia + t1) - 0.5) * 0.2;
                        
                        vec2 heartOffset = getHeartPosition(ia * TWO_PI + randOffset) * t2fb * -0.045; 
                        vec2 layer2_pos = center + heartOffset;
                        
                        float blink = step(1., mod(i, 2.)); 
                        float sdf = star5SDF((scaled_uv - layer2_pos) * 1.2, 0.05, 0.09) + 0.05;
                        float fade = 1.0 - pow(t2fb, 2.0); 
                        
                        color += col * smoothstep(-0.016, flasht*3.6+4.5+ sin(t2fb*30.)*blink, (0.018/sdf)) * fade;
                    }
                }
                return color;
            }

            // --- 座標轉換校正 ---
            vec2 transformCoordinates(vec2 rawCoord, float screenAspect, float videoAspect) {
                vec2 uv = vec2(rawCoord.x, 1.0 - rawCoord.y);
                if (screenAspect < videoAspect) {
                    float scale = screenAspect / videoAspect;
                    uv.x = (uv.x - 0.5) * scale + 0.5;
                } else {
                    float scale = videoAspect / screenAspect;
                    uv.y = (uv.y - 0.5) * scale + 0.5;
                }
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                return uv;
            }

            void main() {
                float screenAspect = iResolution.x / iResolution.y;
                float videoAspect = u_videoResolution.x / u_videoResolution.y;
                
                vec2 screenCenter = vec2(0.5, 0.5);
                vec2 dirFromCenter = vUv - screenCenter;
                float distFromCenter = length(dirFromCenter);

                // ==========================================
                // 1. 相機底圖處理 (保留5倍放射狀模糊)
                // ==========================================
                vec3 cameraCol = vec3(0.0);
                float blurStrength = smoothstep(0.2, 0.8, distFromCenter) * 0.40; 
                
                const int SAMPLES = 24;
                for (int i = 0; i < SAMPLES; i++) {
                    float t_blur = (float(i) / float(SAMPLES - 1)) - 0.5;
                    vec2 sampleUV = vUv + dirFromCenter * (t_blur * blurStrength);
                    
                    vec2 camUv = sampleUV;
                    if (screenAspect < videoAspect) {
                        float scale = screenAspect / videoAspect;
                        camUv.x = (sampleUV.x - 0.5) * scale + 0.5;
                    } else {
                        float scale = videoAspect / screenAspect;
                        camUv.y = (sampleUV.y - 0.5) * scale + 0.5;
                    }
                    
                    vec2 lookupUv = vec2(1.0 - camUv.x, camUv.y);
                    cameraCol += texture2D(u_cameraTexture, lookupUv).rgb;
                }
                cameraCol /= float(SAMPLES);
                
                // 相機畫面壓暗
                cameraCol *= 0.55;
                
                // ==========================================
                // 2. 融入火焰背景 (Fire Shader)
                // ==========================================
                vec2 fireUV = (2.0 * gl_FragCoord.xy - iResolution.xy) / iResolution.x;
                float fireVignette = 1.0 - smoothstep(0.4, 1.4, length(fireUV + vec2(0.0, 0.3)));
                fireUV *= 1.8;
                
                float smokeIntensity = layeredNoise1_2(fireUV * 10.0 + iTime * 4.0 * MOVEMENT_DIRECTION * MOVEMENT_SPEED, 1.7, 0.7, 6, 0.2);
                smokeIntensity *= pow(1.0 - smoothstep(-1.0, 1.6, fireUV.y), 2.0); 
                vec3 smoke = smokeIntensity * SMOKE_COLOR * 0.8 * fireVignette;
                
                smoke *= pow(layeredNoise1_2(fireUV * 4.0 + iTime * 0.5 * MOVEMENT_DIRECTION * MOVEMENT_SPEED, 1.8, 0.5, 3, 0.2), 2.0) * 1.5;
                
                vec3 particles = layeredParticles(fireUV, SIZE_MOD, ALPHA_MOD, LAYERS_COUNT, smokeIntensity);
                vec3 fireBgCol = particles + smoke + SMOKE_COLOR * 0.02;
                fireBgCol *= fireVignette;
                fireBgCol = smoothstep(-0.08, 1.0, fireBgCol);

                // 將火焰疊加到背景 (Screen/Additive Blending)
                vec3 finalCol = clamp(cameraCol + fireBgCol, 0.0, 1.0);

                // ==========================================
                // 3. 愛心煙火噴發特效
                // ==========================================
                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                
                vec2 leftEye = transformCoordinates(vec2(1.0 - u_leftEyeRaw.x, u_leftEyeRaw.y), screenAspect, videoAspect);
                vec2 rightEye = transformCoordinates(vec2(1.0 - u_rightEyeRaw.x, u_rightEyeRaw.y), screenAspect, videoAspect);
                
                vec2 scaled_uv = uv * 2.0;
                vec2 scaled_leftEye = leftEye * 2.0;
                vec2 scaled_rightEye = rightEye * 2.0;
                
                vec3 eyeFX = vec3(0.0);
                if (u_hasFace > 0.5) {
                    eyeFX += renderHeartFireworks(scaled_uv, scaled_leftEye, 0.0);
                    eyeFX += renderHeartFireworks(scaled_uv, scaled_rightEye, 0.5);
                }
                
                finalCol = clamp(finalCol + eyeFX, 0.0, 1.0);
                
                // ==========================================
                // 4. 全局畫面暗角 (Vignette)
                // ==========================================
                float vignette = smoothstep(0.75, 0.25, distFromCenter);
                finalCol *= mix(0.3, 1.0, vignette);

                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                u_videoResolution: { value: new THREE.Vector2(1280, 720) }, 
                iTime: { value: 0 },
                u_leftEyeRaw: { value: leftEyeRaw },
                u_rightEyeRaw: { value: rightEyeRaw },
                u_hasFace: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            material.uniforms.u_leftEyeRaw.value.copy(leftEyeRaw);
            material.uniforms.u_rightEyeRaw.value.copy(rightEyeRaw);
            material.uniforms.u_hasFace.value = hasFace ? 1.0 : 0.0;
            
            if (videoElement.videoWidth) {
                material.uniforms.u_videoResolution.value.set(videoElement.videoWidth, videoElement.videoHeight);
            }

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                hasFace = true;
                const landmarks = results.multiFaceLandmarks[0];
                const leftEye = landmarks[468];
                const rightEye = landmarks[473];

                leftEyeRaw.set(leftEye.x, leftEye.y);
                rightEyeRaw.set(rightEye.x, rightEye.y);
            } else {
                hasFace = false;
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        window.addEventListener('load', () => {
            initWebGL();
            cameraUtils.start().catch(err => {
                console.error("相機啟動失敗：", err);
            });
        });
    </script>
</body>
</html>
