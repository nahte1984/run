<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動眼睛煙火特效 - 修正過曝版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1);
            display: none; /* 隱藏原生視訊，我們完全用 Shader 來畫它 */
        }

        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
        }

        #status {
            font-weight: bold;
        }

        .loading-dot {
            animation: dot-flash 1.5s infinite;
        }

        @keyframes dot-flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <div id="ui-overlay">
        <div id="status">正在開啟鏡頭與 AI 模型<span class="loading-dot">...</span></div>
        <div id="instructions">請面向鏡頭並確保光線充足</div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');
        const statusElement = document.getElementById('status');
        const uiOverlay = document.getElementById('ui-overlay');

        let renderer, scene, camera, material, mesh, cameraTexture;
        let leftEyePos = new THREE.Vector2(-999.0, -999.0);
        let rightEyePos = new THREE.Vector2(-999.0, -999.0);
        let hasFace = false;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform float iTime;
            uniform vec2 u_leftEye;   
            uniform vec2 u_rightEye;  
            uniform float u_hasFace;  
            varying vec2 vUv;

            #define PI 3.141592653589793238
            #define TWOPI 6.283185307179586
            #define S(x,y,z) smoothstep(x,y,z)
            #define B(x,y,z,w) S(x-z, x+z, w)*S(y+z, y-z, w)
            #define saturate(x) clamp(x,0.,1.)

            #define NUM_EXPLOSIONS 6.
            #define NUM_PARTICLES 50.

            #define MOD3 vec3(.1031,.11369,.13787)
            vec3 hash31(float p) {
               vec3 p3 = fract(vec3(p) * MOD3);
               p3 += dot(p3, p3.yzx + 19.19);
               return fract(vec3((p3.x + p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
            }

            float light(vec2 uv, vec2 pos, float size) {
                uv -= pos;
                // 增加一個微小的極值防線（+0.0001），防止分母為 0 導致無限亮而過曝
                return size / (dot(uv, uv) + 0.0001);
            }

            vec3 explosion(vec2 uv, vec2 p, float seed, float t) {
                vec3 col = vec3(0.);
                vec3 en = hash31(seed);
                vec3 baseCol = en;
                for(float i=0.; i<NUM_PARTICLES; i++) {
                    vec3 n = hash31(i)-.5;
                    vec2 startP = p-vec2(0., t*t*.03); 
                    vec2 endP = startP+normalize(n.xy)*n.z*0.25; 
                    
                    float pt = 1.-pow(t-1., 2.);
                    vec2 pos = mix(p, endP, pt);    
                    float size = mix(.005, .001, S(0., .1, pt));
                    size *= S(1., .1, pt);
                    
                    float sparkle = (sin((pt+n.z)*100.)*.5+.5);
                    sparkle = pow(sparkle, pow(en.x, 3.)*50.)*mix(0.01, .01, en.y*n.y);
                    size += sparkle*B(en.x, en.y, en.z, t);
                    
                    col += baseCol*light(uv, pos, size);
                }
                return col;
            }

            vec3 Rainbow(vec3 c) {
                float t=iTime;
                float avg = (c.r+c.g+c.b)/3.;
                c = avg + (c-avg)*sin(vec3(0., .333, .666)+t);
                c += sin(vec3(.4, .3, .3)*t + vec3(1.1244,3.43215,6.435))*vec3(.4, .1, .5);
                return c;
            }

            void main() {
                // 因為視訊在網頁有做鏡像，Shader 讀取紋理時 X 軸也要反轉才對得齊臉
                vec2 camUv = vec2(1.0 - vUv.x, vUv.y);
                vec3 cameraCol = texture2D(u_cameraTexture, camUv).rgb;
                
                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= .5;
                uv.x *= iResolution.x/iResolution.y;
                
                float t = iTime * 0.8; 
                vec3 fireworkCol = vec3(0.);
                
                if (u_hasFace > 0.5) {
                    for(float i=0.; i<NUM_EXPLOSIONS; i++) {
                        float et = t + i * 1234.45235;
                        float id = floor(et);
                        et -= id;
                        
                        float eyeIndex = mod(i, 2.0);
                        vec2 targetEye = (eyeIndex < 1.0) ? u_leftEye : u_rightEye;
                        
                        vec3 offset = hash31(id) - 0.5;
                        vec2 p = targetEye + offset.xy * 0.05; 
                        
                        fireworkCol += explosion(uv, p, id, et);
                    }
                }
                
                fireworkCol = Rainbow(fireworkCol);
                
                // --- 核心修正：防止過曝的 Screen Blending (濾色模式) ---
                // 公式：1.0 - (1.0 - A) * (1.0 - B)
                // 這能確保不論怎麼疊加，數值絕對不會超過 1.0，且黑底會完全變不見，只留下亮處。
                fireworkCol = saturate(fireworkCol * 0.5); // 稍微調和煙火自身強度
                vec3 finalCol = 1.0 - (1.0 - cameraCol) * (1.0 - fireworkCol);
                
                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // 更新：使用相容性更好的 VideoTexture 宣告方式
            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                iTime: { value: 0 },
                u_leftEye: { value: leftEyePos },
                u_rightEye: { value: rightEyePos },
                u_hasFace: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            material.uniforms.u_leftEye.value.copy(leftEyePos);
            material.uniforms.u_rightEye.value.copy(rightEyePos);
            material.uniforms.u_hasFace.value = hasFace ? 1.0 : 0.0;

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            if(uiOverlay && statusElement) {
                uiOverlay.style.display = 'none';
            }

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                hasFace = true;
                const landmarks = results.multiFaceLandmarks[0];

                const leftEye = landmarks[468];
                const rightEye = landmarks[473];

                const aspect = window.innerWidth / window.innerHeight;

                // 修正了鏡像後的眼睛 X 軸反轉對位
                leftEyePos.x = (1.0 - leftEye.x) - 0.5;
                leftEyePos.x *= aspect;
                leftEyePos.y = (1.0 - leftEye.y) * 2.0 - 1.0;
                leftEyePos.y = (leftEyePos.y * (window.innerHeight/window.innerWidth)) * aspect;

                rightEyePos.x = (1.0 - rightEye.x) - 0.5;
                rightEyePos.x *= aspect;
                rightEyePos.y = (1.0 - rightEye.y) * 2.0 - 1.0;
                rightEyePos.y = (rightEyePos.y * (window.innerHeight/window.innerWidth)) * aspect;
            } else {
                hasFace = false;
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        window.addEventListener('load', () => {
            initWebGL();
            cameraUtils.start().catch(err => {
                statusElement.innerHTML = "<span style='color:red;'>無法存取相機，請檢查權限。</span>";
                console.error(err);
            });
        });
    </script>
</body>
</html>
