<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼睛煙火互動特效</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* 隱藏原始視訊畫面，我們只需要它的數據 */
        #webcam {
            display: none;
        }
        /* 讓畫布填滿螢幕 */
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            z-index: 10;
            pointer-events: none;
        }
    </style>

    <!-- 引入 Three.js 核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- 引入 MediaPipe Face Mesh 用於人臉偵測 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">正在請求相機權限並載入 AI 模型...</div>
    <div id="canvas-container">
        <!-- 視訊標籤 (隱藏) -->
        <video id="webcam" autoplay playsinline></video>
        <!-- WebGL 渲染畫布 -->
        <canvas id="webgl-canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');
        const loadingElement = document.getElementById('loading');

        let renderer, scene, camera, material, mesh;
        let leftEyePos = new THREE.Vector2(-999.0, -999.0); // 初始值在螢幕外
        let rightEyePos = new THREE.Vector2(-999.0, -999.0);
        let hasFace = false;

        // --- 1. 定義修改後的 Shader ---
        // 為了支援互動，將原本 mainImage 隨機產生的位置，改為由 JavaScript 傳入的眼睛 uniforms 變數
        const vertexShader = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec2 iResolution;
            uniform float iTime;
            uniform vec2 u_leftEye;   // JS 傳入的左眼座標
            uniform vec2 u_rightEye;  // JS 傳入的右眼座標
            uniform float u_hasFace;  // 是否有偵測到臉 (1.0 = 有, 0.0 = 無)

            #define PI 3.141592653589793238
            #define TWOPI 6.283185307179586
            #define S(x,y,z) smoothstep(x,y,z)
            #define B(x,y,z,w) S(x-z, x+z, w)*S(y+z, y-z, w)
            #define saturate(x) clamp(x,0.,1.)

            // 為了讓眼睛處的煙火更密集，將煙火數量調整為 6 朵（左眼3朵，右眼3朵）
            #define NUM_EXPLOSIONS 6.
            #define NUM_PARTICLES 60.

            #define MOD3 vec3(.1031,.11369,.13787)
            vec3 hash31(float p) {
               vec3 p3 = fract(vec3(p) * MOD3);
               p3 += dot(p3, p3.yzx + 19.19);
               return fract(vec3((p3.x + p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
            }

            float light(vec2 uv, vec2 pos, float size) {
                uv -= pos;
                size *= size;
                return size/dot(uv, uv);
            }

            vec3 explosion(vec2 uv, vec2 p, float seed, float t) {
                vec3 col = vec3(0.);
                vec3 en = hash31(seed);
                vec3 baseCol = en;
                for(float i=0.; i<NUM_PARTICLES; i++) {
                    vec3 n = hash31(i)-.5;
                    vec2 startP = p-vec2(0., t*t*.05); // 稍微減弱重力讓煙火留在眼睛周圍
                    vec2 endP = startP+normalize(n.xy)*n.z*0.3; // 縮小爆炸範圍，更集中在眼睛
                    
                    float pt = 1.-pow(t-1., 2.);
                    vec2 pos = mix(p, endP, pt);    
                    float size = mix(.008, .003, S(0., .1, pt));
                    size *= S(1., .1, pt);
                    
                    float sparkle = (sin((pt+n.z)*100.)*.5+.5);
                    sparkle = pow(sparkle, pow(en.x, 3.)*50.)*mix(0.01, .01, en.y*n.y);
                    size += sparkle*B(en.x, en.y, en.z, t);
                    
                    col += baseCol*light(uv, pos, size);
                }
                return col;
            }

            vec3 Rainbow(vec3 c) {
                float t=iTime;
                float avg = (c.r+c.g+c.b)/3.;
                c = avg + (c-avg)*sin(vec3(0., .333, .666)+t);
                c += sin(vec3(.4, .3, .3)*t + vec3(1.1244,3.43215,6.435))*vec3(.4, .1, .5);
                return c;
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= .5;
                uv.x *= iResolution.x/iResolution.y;
                
                float t = iTime * 0.8; // 稍微加快煙火循環速度
                vec3 c = vec3(0.);
                
                // 只有在畫面上偵測到人臉時才施放煙火
                if (u_hasFace > 0.5) {
                    for(float i=0.; i<NUM_EXPLOSIONS; i++) {
                        float et = t + i * 1234.45235;
                        float id = floor(et);
                        et -= id;
                        
                        // 決定這朵煙火屬於左眼還是右眼
                        vec2 targetEye = (mod(i, 2.0) < 1.0) ? u_leftEye : u_rightEye;
                        
                        // 在眼睛座標周圍加上一點點隨機微調，讓煙火交錯開來
                        vec3 offset = hash31(id) - 0.5;
                        vec2 p = targetEye + offset.xy * 0.08; 
                        
                        c += explosion(uv, p, id, et);
                    }
                }
                
                c = Rainbow(c);
                gl_FragColor = vec4(c, 1.0);
            }
        `;

        // --- 2. 初始化 WebGL (Three.js) 環境 ---
        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            // 設置傳遞給 Shader 的變數 (Uniforms)
            const uniforms = {
                iResolution: { value: new THREE.Vector2(width, height) },
                iTime: { value: 0 },
                u_leftEye: { value: leftEyePos },
                u_rightEye: { value: rightEyePos },
                u_hasFace: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            // 建立一個填滿螢幕的平面來畫 Shader
            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            // 更新時間
            material.uniforms.iTime.value = timestamp / 1000.0;
            // 更新眼睛位置與人臉狀態
            material.uniforms.u_leftEye.value.copy(leftEyePos);
            material.uniforms.u_rightEye.value.copy(rightEyePos);
            material.uniforms.u_hasFace.value = hasFace ? 1.0 : 0.0;

            renderer.render(scene, camera);
        }

        // --- 3. 初始化 MediaPipe Face Mesh AI 模型 ---
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1, // 只追蹤一張臉
            refineLandmarks: true, // 精細追蹤（包含眼球瞳孔）
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 接收 AI 偵測後的結果
        faceMesh.onResults(results => {
            // 隱藏載入中文字
            if(loadingElement) {
                loadingElement.style.display = 'none';
            }

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                hasFace = true;
                const landmarks = results.multiFaceLandmarks[0];

                // MediaPipe 的眼睛索引點：
                // 左眼中心大約在 468，右眼中心大約在 473 (精細模式)
                const leftEye = landmarks[468];
                const rightEye = landmarks[473];

                const aspect = window.innerWidth / window.innerHeight;

                // 將 MediaPipe 的 0~1 空間座標，轉換為 Shader 的 UV 座標系統
                // 因為自拍鏡頭像照鏡子，X 軸需要左右反轉 (1.0 - x)
                leftEyePos.x = (1.0 - leftEye.x) - 0.5;
                leftEyePos.x *= aspect;
                leftEyePos.y = (1.0 - leftEye.y) * 2.0 - 1.0; // 映射到對應高度
                leftEyePos.y = (leftEyePos.y * (window.innerHeight/window.innerWidth)) * aspect; // 修正比例

                rightEyePos.x = (1.0 - rightEye.x) - 0.5;
                rightEyePos.x *= aspect;
                rightEyePos.y = (1.0 - rightEye.y) * 2.0 - 1.0;
                rightEyePos.y = (rightEyePos.y * (window.innerHeight/window.innerWidth)) * aspect;
            } else {
                hasFace = false; // 沒偵測到人臉時，不顯示煙火
            }
        });

        // --- 4. 啟動鏡頭與串流 ---
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });

        // 啟動流程
        initWebGL();
        cameraUtils.start().catch(err => {
            loadingElement.innerText = "無法開啟相機，請確保已給予相機權限。";
            console.error(err);
        });

    </script>
</body>
</html>
