<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Warping Particles - Vibe Coding</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>
    <!-- 引入 Three.js 核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading">請允許相機權限以啟動粒子星雲...</div>
    <canvas id="canvas"></canvas>

    <!-- Fragment Shader (片段著色器) -->
    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform vec2 iResolution;
        uniform float iTime;
        uniform sampler2D iChannel0; // 相機紋理輸入

        void main() {
            // 將畫面上傳的座標轉為與 Shadertoy 相同的 fragCoord 概念
            vec2 fragCoord = gl_FragCoord.xy;

            float time = (iTime + 100.0) * 30.0;
            float s = 0.0;
            
            // 兩組 UV
            vec2 origUV = fragCoord / iResolution.xy; 
            // 翻轉相機左右（鏡像），這樣你在鏡頭前動起來比較直覺
            origUV.x = 1.0 - origUV.x; 
            
            vec2 uv = (-iResolution.xy + 2.0 * fragCoord ) / iResolution.y;

            // 旋轉動態
            float t = time * 0.005;
            float si = sin(t * 1.5);
            float co = cos(t);
            uv *= mat2(co, si, -si, co);

            vec3 col = vec3(0.0);
            vec3 init = vec3(0.25, 0.25, time * 0.001);

            // 射線步進循環
            for (int r = 0; r < 60; r++) {
                vec3 p = init + s * vec3(uv, 0.15);
                p.z = mod(p.z, 2.0);
                
                // Kali Loop
                for (int i = 0; i < 10; i++) {
                    p = abs(p * 2.04) / dot(p, p) - 0.75;
                }
                
                float scarcity = 0.5;
                float energy = max(0.0, length(p) * scarcity);
                float fade = smoothstep(0.0, 0.5, 1.0 - s);
                
                // 採樣相機顏色
                vec3 camCol = texture2D(iChannel0, origUV).rgb;
                
                // 累積顏色
                col += camCol * energy * fade * 0.015;
                s += 0.015;
            }

            col = pow(col, vec3(0.8));
            vec3 bgCam = texture2D(iChannel0, origUV).rgb * 0.1;
            
            gl_FragColor = vec4(col + bgCam, 1.0);
        }
    </script>

    <!-- Vertex Shader (頂點著色器：基本上就是把畫布鋪滿螢幕) -->
    <script id="vertexShader" type="x-shader/x-vertex">
        void main() {
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <!-- 主程式邏輯 -->
    <script>
        let scene, camera, renderer, material, mesh;
        let video, videoTexture;
        let uniforms;

        const loadingEl = document.getElementById('loading');

        // 1. 初始化相機鏡頭
        async function setupCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                loadingEl.innerText = "你的瀏覽器不支援相機功能";
                return null;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: "user" },
                    audio: false
                });
                
                video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                
                // 確保影片中繼資料載入後才開始渲染，避免抓到空紋理
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve(video);
                    };
                });
            } catch (err) {
                console.error(err);
                loadingEl.innerText = "無法取得相機權限：" + err.message;
                return null;
            }
        }

        // 2. 初始化 WebGL / Three.js 舞台
        function initWebGL(videoElement) {
            const canvas = document.getElementById('canvas');
            
            // 建立場景與正交相機（用來畫 2D 平面貼條）
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // 將相機畫面轉為 Three.js 的 Texture
            videoTexture = new THREE.VideoTexture(videoElement);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
            videoTexture.format = THREE.RGBFormat;

            // 設定傳給 Shader 的變數 (Uniforms)
            uniforms = {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                iChannel0: { value: videoTexture }
            };

            // 建立 Shader 材質
            material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: uniforms
            });

            // 建立一個鋪滿螢幕的平面
            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // 隱藏 Loading 字樣
            loadingEl.style.opacity = 0;

            // 監聽視窗縮放
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        }

        // 3. 動畫渲染循環
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            // 更新時間
            uniforms.iTime.value = clock.getElapsedTime();
            
            // 渲染畫面
            renderer.render(scene, camera);
        }

        // 主入口
        async function main() {
            const videoElement = await setupCamera();
            if (videoElement) {
                initWebGL(videoElement);
                animate();
            }
        }

        main();
    </script>
</body>
</html>
