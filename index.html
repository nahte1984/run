<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動眼睛煙火特效 - 完美對位版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1);
            display: none; /* 完全由 WebGL 渲染，確保底圖與特效同步缩放 */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');

        let renderer, scene, camera, material, mesh, cameraTexture;
        let leftEyePos = new THREE.Vector2(-999.0, -999.0);
        let rightEyePos = new THREE.Vector2(-999.0, -999.0);
        let hasFace = false;

        // 相機捕捉的原始解析度，稍後會動態更新
        let videoWidth = 1280;
        let videoHeight = 720;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform vec2 u_videoResolution;
            uniform float iTime;
            uniform vec2 u_leftEye;   
            uniform vec2 u_rightEye;  
            uniform float u_hasFace;  
            varying vec2 vUv;

            #define S(x,y,z) smoothstep(x,y,z)
            #define B(x,y,z,w) S(x-z, x+z, w)*S(y+z, y-z, w)
            #define saturate(x) clamp(x,0.,1.)

            #define NUM_EXPLOSIONS 4.
            #define NUM_PARTICLES 45.

            #define MOD3 vec3(.1031,.11369,.13787)
            vec3 hash31(float p) {
               vec3 p3 = fract(vec3(p) * MOD3);
               p3 += dot(p3, p3.yzx + 19.19);
               return fract(vec3((p3.x + p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
            }

            float circ(vec2 uv, vec2 pos, float size) {
                uv -= pos;
                return S(size * 1.2, size, dot(uv, uv));
            }

            vec3 explosion(vec2 uv, vec2 p, float seed, float t) {
                vec3 col = vec3(0.);
                vec3 en = hash31(seed);
                vec3 baseCol = en;
                
                for(float i=0.; i<NUM_PARTICLES; i++) {
                    vec3 n = hash31(i)-.5;
                    float pt = 1.-pow(t-1., 2.);
                    
                    vec2 startP = p - vec2(0., pt*pt*.02); 
                    vec2 endP = startP + normalize(n.xy)*n.z*0.15; 
                    vec2 pos = mix(p, endP, pt);    
                    
                    float size = mix(.00008, .00002, S(0., .1, pt));
                    size *= S(1., .2, pt);
                    
                    float sparkle = (sin((pt+n.z)*80.)*.5+.5);
                    sparkle = pow(sparkle, 10.) * 0.00002;
                    size += sparkle*B(en.x, en.y, en.z, t);
                    
                    col += baseCol * circ(uv, pos, size);
                }
                return col;
            }

            vec3 Rainbow(vec3 c) {
                float t = iTime * 1.5;
                float avg = (c.r+c.g+c.b)/3.;
                c = avg + (c-avg)*sin(vec3(0., .333, .666)+t);
                return c;
            }

            void main() {
                // --- 修正底圖的 Object-Fit: Cover 裁切邏輯 ---
                vec2 screenUV = gl_FragCoord.xy / iResolution.xy;
                
                float screenAspect = iResolution.x / iResolution.y;
                float videoAspect = u_videoResolution.x / u_videoResolution.y;
                
                vec2 camUv = vUv;
                if (screenAspect < videoAspect) {
                    // 螢幕比相機窄 (例如手機直向螢幕)
                    float scale = screenAspect / videoAspect;
                    camUv.x = (vUv.x - 0.5) * scale + 0.5;
                } else {
                    // 螢幕比相機寬
                    float scale = videoAspect / screenAspect;
                    camUv.y = (vUv.y - 0.5) * scale + 0.5;
                }
                
                // 修正鏡像
                camUv.x = 1.0 - camUv.x;
                vec3 cameraCol = texture2D(u_cameraTexture, camUv).rgb;
                
                // --- Shader 粒子座標系統 ---
                vec2 uv = screenUV;
                uv.x -= 0.5;
                uv.x *= screenAspect;
                
                float t = iTime * 1.2; 
                vec3 fireworkCol = vec3(0.);
                
                if (u_hasFace > 0.5) {
                    for(float i=0.; i<NUM_EXPLOSIONS; i++) {
                        float et = t + i * 567.89;
                        float id = floor(et);
                        et -= id;
                        
                        vec2 targetEye = (mod(i, 2.0) < 1.0) ? u_leftEye : u_rightEye;
                        vec3 offset = hash31(id) - 0.5;
                        vec2 p = targetEye + offset.xy * 0.015; 
                        
                        fireworkCol += explosion(uv, p, id, et);
                    }
                }
                
                fireworkCol = Rainbow(fireworkCol);
                fireworkCol = clamp(fireworkCol, 0.0, 1.0);
                
                // Alpha 覆蓋混合，不產生光害過曝
                vec3 finalCol = mix(cameraCol, fireworkCol, length(fireworkCol));
                
                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                u_videoResolution: { value: new THREE.Vector2(videoWidth, videoHeight) },
                iTime: { value: 0 },
                u_leftEye: { value: leftEyePos },
                u_rightEye: { value: rightEyePos },
                u_hasFace: { value: 0.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            material.uniforms.u_leftEye.value.copy(leftEyePos);
            material.uniforms.u_rightEye.value.copy(rightEyePos);
            material.uniforms.u_hasFace.value = hasFace ? 1.0 : 0.0;
            material.uniforms.u_videoResolution.value.set(videoWidth, videoHeight);

            renderer.render(scene, camera);
        }

        // --- 精確演算法：同步模擬 CSS Object-Fit: Cover 的座標轉換 ---
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(results => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                hasFace = true;
                const landmarks = results.multiFaceLandmarks[0];

                const leftEye = landmarks[468];
                const rightEye = landmarks[473];

                const screenWidth = window.innerWidth;
                const screenHeight = window.innerHeight;
                
                // 1. 計算視訊與螢幕的縮放比例 (模擬 object-fit: cover)
                const scaleX = screenWidth / videoWidth;
                const scaleY = screenHeight / videoHeight;
                const renderScale = Math.max(scaleX, scaleY);

                // 2. 計算視訊被放大後的實際渲染尺寸
                const vRenderWidth = videoWidth * renderScale;
                const vRenderHeight = videoHeight * renderScale;

                // 3. 計算因為置中對齊產生的裁切偏移量量 (Pixels)
                const offsetX = (vRenderWidth - screenWidth) / 2;
                const offsetY = (vRenderHeight - screenHeight) / 2;

                // 4. 將 MediaPipe 的 0~1 轉換成「放大後的視訊絕對像素座標」
                // 注意：因為 MediaPipe 拿到的視訊通常是橫向的（1280x720），手機直持時會自動旋轉，所以它的 x, y 要對應好
                const lxPix = (1.0 - leftEye.x) * vRenderWidth - offsetX;
                const lyPix = leftEye.y * vRenderHeight - offsetY;

                const rxPix = (1.0 - rightEye.x) * vRenderWidth - offsetX;
                const ryPix = rightEye.y * vRenderHeight - offsetY;

                // 5. 將像素座標完美對齊到 WebGL Shader 的 UV 座標系統內 (-Aspect/2 ~ +Aspect/2)
                const screenAspect = screenWidth / screenHeight;

                leftEyePos.x = (lxPix / screenWidth - 0.5) * screenAspect;
                leftEyePos.y = 0.5 - (lyPix / screenHeight);

                rightEyePos.x = (rxPix / screenWidth - 0.5) * screenAspect;
                rightEyePos.y = 0.5 - (ryPix / screenHeight);

            } else {
                hasFace = false;
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                // 當相機成功啟動後，獲取實際輸出的解析度（通常為 1280x720 或手機直向時的 720x1280）
                if (videoElement.videoWidth && videoElement.videoWidth !== videoWidth) {
                    videoWidth = videoElement.videoWidth;
                    videoHeight = videoElement.videoHeight;
                }
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        window.addEventListener('load', () => {
            initWebGL();
            cameraUtils.start().catch(err => {
                console.error("無法啟動相機：", err);
            });
        });
    </script>
</body>
</html>
