<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whenever i see u | v9.3.0 (Multi-Face & Mouth)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* --- 開始畫面與圖片樣式 --- */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000; /* [修改1] 底色 */
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* [修改2] 螢幕為直向 (長) 時，寬度 */
        @media (orientation: portrait) {
            #start-btn {
                width: 70vw;
                height: auto;
            }
        }

        /* [修改3] 螢幕為橫向 (寬) 時，高度 */
        @media (orientation: landscape) {
            #start-btn {
                width: auto;
                height: 70vh;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="start-screen">
        <img id="start-btn" src="start.png" alt="Start Experience">
    </div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="webgl-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('webgl-canvas');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        let renderer, scene, camera, material, mesh, cameraTexture;
        
        // --- 修改：支持多張臉和嘴巴偵測 ---
        const MAX_FACES = 2; // 設置最大偵測人數
        let leftEyesRaw = Array(MAX_FACES).fill().map(() => new THREE.Vector2(0.5, 0.5)); //
        let rightEyesRaw = Array(MAX_FACES).fill().map(() => new THREE.Vector2(0.5, 0.5)); //
        let mouthsRaw = Array(MAX_FACES).fill().map(() => new THREE.Vector2(0.5, 0.5)); //
        let mouthsOpen = Array(MAX_FACES).fill(0.0); // 1.0 表示張開，0.0 表示閉合
        let faceCount = 0; //

        let videoWidth = 1280;
        let videoHeight = 720;

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform sampler2D u_cameraTexture; 
            uniform vec2 iResolution;
            uniform vec2 u_videoResolution;
            uniform float iTime;
            
            // --- 修改：Uniforms 變更為數組以支持多臉 ---
            const int MAX_FACES = ${MAX_FACES};
            uniform vec2 u_leftEyes[MAX_FACES];   
            uniform vec2 u_rightEyes[MAX_FACES];  
            uniform vec2 u_mouths[MAX_FACES];
            uniform float u_mouthsOpen[MAX_FACES]; //
            uniform int u_faceCount;  //
            
            varying vec2 vUv;

            #define PI      3.141592653589793
            #define TWO_PI  6.283185307179586

            // ==========================================
            // 背景煙火設定 (稀疏點綴版)
            // ==========================================
            #define Gravitational_ACCE vec2(0.0, -0.2)
            #define NUM_SPARKS 15
            #define NUM_FIREWORKS 3
            #define Period 8.0

            float rand(float co) { 
                return fract(sin(co*(91.3458)) * 47453.5453);
            }

            vec3 spark(vec2 coord, vec2 origin, vec3 sparkColor, vec2 velocity, float periodTime, float seed) {
                vec2 displacement = velocity * periodTime + 0.5 * Gravitational_ACCE * periodTime * periodTime;
                vec2 sparkPos = origin + displacement;
                float len = length(coord - sparkPos);
                
                vec3 color = sparkColor * pow(1.0 - smoothstep(0.001, 0.05, len), 8.0);
                color += vec3(1.0) * (1.0 - smoothstep(0.001, 0.005, len));
                color *= (1.0 - smoothstep(0.0, Period, periodTime));
                color *= sin(periodTime*50.0 + seed)*0.4 + 0.6;
                return color;
            }

            vec3 firework(vec2 coord, float currentPeriod, float periodTime) {   
                vec2 origin;
                origin.x = (0.2 + 0.6*rand(currentPeriod)) * iResolution.x/iResolution.y ;
                origin.y = (0.4 + 0.4*rand(currentPeriod));

                vec3 color = vec3(0.0);
                for(int i=0; i < NUM_SPARKS; i++) {
                    float fi = float(i);
                    vec2 velocity;
                    velocity.x = 0.5*(rand(currentPeriod+fi*0.4)-0.5);
                    velocity.y = 0.5*(rand(currentPeriod+fi*0.5)-0.5);
                    velocity = normalize(velocity);
                    velocity *= 0.2 + rand(currentPeriod+fi*0.6) * 0.3;
                    
                    vec3 sparkColor;
                    sparkColor.r = 0.3+0.7*rand(currentPeriod+fi*0.1);
                    sparkColor.g = 0.3+0.7*rand(currentPeriod+fi*0.2);
                    sparkColor.b = 0.3+0.7*rand(currentPeriod+fi*0.3);
                    color += spark(coord, origin, sparkColor, velocity, periodTime, fi);
                }
                return color;
            }

            // ==========================================
            // 愛心煙火設定 (Heart Fireworks Functions)
            // ==========================================
            float star5SDF( vec2 p, float r, float m){
                const vec2 k1 = vec2(0.809016994375, -0.587785252292);
                const vec2 k2 = vec2(-k1.x,k1.y);
                p.x = abs(p.x);
                p -= 2.0*max(dot(k1,p),0.0)*k1;
                p -= 2.0*max(dot(k2,p),0.0)*k2;
                p.x = abs(p.x);
                p.y -= r;
                vec2 ab = m*vec2(-k1.y,k1.x) - vec2(0,r); 
                float h = clamp( dot(p,ab)/dot(ab,ab), 0.0, 1.0 );
                return length(p-ab*h) * sign(p.y*ab.x-p.x*ab.y);
            }

            float hash1(float p){
                p = fract(p * .1031*9811.164);  
                p *= p + 33.33; 
                p *= p + p;
                return fract(p);
            }

            vec3 colorRibbon(float t){
                return abs(mod(vec3(0.,1.,2.)/3. + t, 1.) - .5) * 4. - 0.5;
            }

            vec2 getHeartPosition(float t){
                return vec2(16.0 * sin(t) * sin(t) * sin(t), -(13.0 * cos(t) - 5.0 * cos(2.0*t)- 2.0 * cos(3.0*t) - cos(4.0*t)));
            }

            vec3 renderHeartFireworks(vec2 scaled_uv, vec2 center, float timeOffset) {
                float t = (iTime * 0.35) + timeOffset; 
                vec3 color = vec3(0.);
                
                const float jmax = 3.0; 
                const float imax = 20.0; 
                
                float dist = length(scaled_uv - center);
                if(dist > 1.8) return vec3(0.0);

                for(float j=0.; j<jmax; j++){
                    float ja = j/jmax;
                    float local_t = t - hash1(ja*33.669) * 2.0; 
                    float t1 = floor(local_t); 
                    float t2fb = fract(local_t); 
                    
                    float flasht = t2fb * (step(0.0, t2fb) - step(0.1, t2fb)) * 10.;
                    vec3 col = colorRibbon(hash1(ja + t1)); 
                    
                    for(float i=0.; i<imax; i++){ 
                        float ia = i/imax;
                        float randOffset = (hash1(ia + t1) - 0.5) * 0.2;
                        
                        vec2 heartOffset = getHeartPosition(ia * TWO_PI + randOffset) * t2fb * -0.045; 
                        vec2 layer2_pos = center + heartOffset;
                        
                        float blink = step(1., mod(i, 2.)); 
                        float sdf = star5SDF((scaled_uv - layer2_pos) * 1.2, 0.05, 0.09) + 0.05;
                        float fade = 1.0 - pow(t2fb, 2.0); 
                        
                        color += col * smoothstep(-0.016, flasht*3.6+4.5+ sin(t2fb*30.)*blink, (0.018/sdf)) * fade;
                    }
                }
                return color;
            }

            // --- 座標轉換校正 ---
            vec2 transformCoordinates(vec2 rawCoord, float screenAspect, float videoAspect) {
                vec2 uv = vec2(rawCoord.x, 1.0 - rawCoord.y);
                if (screenAspect < videoAspect) {
                    float scale = screenAspect / videoAspect;
                    uv.x = (uv.x - 0.5) * scale + 0.5;
                } else {
                    float scale = videoAspect / screenAspect;
                    uv.y = (uv.y - 0.5) * scale + 0.5;
                }
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                return uv;
            }

            void main() {
                float screenAspect = iResolution.x / iResolution.y;
                float videoAspect = u_videoResolution.x / u_videoResolution.y;
                
                vec2 screenCenter = vec2(0.5, 0.5);
                vec2 dirFromCenter = vUv - screenCenter;
                float distFromCenter = length(dirFromCenter);

                // ==========================================
                // 1. 相機底圖處理 (保留放射狀模糊)
                // ==========================================
                vec3 cameraCol = vec3(0.0);
                float blurStrength = smoothstep(0.2, 0.8, distFromCenter) * 0.40; 
                
                const int SAMPLES = 24;
                for (int i = 0; i < SAMPLES; i++) {
                    float t_blur = (float(i) / float(SAMPLES - 1)) - 0.5;
                    vec2 sampleUV = vUv + dirFromCenter * (t_blur * blurStrength);
                    
                    vec2 camUv = sampleUV;
                    if (screenAspect < videoAspect) {
                        float scale = screenAspect / videoAspect;
                        camUv.x = (sampleUV.x - 0.5) * scale + 0.5;
                    } else {
                        float scale = videoAspect / screenAspect;
                        camUv.y = (sampleUV.y - 0.5) * scale + 0.5;
                    }
                    
                    vec2 lookupUv = vec2(1.0 - camUv.x, camUv.y);
                    cameraCol += texture2D(u_cameraTexture, lookupUv).rgb;
                }
                cameraCol /= float(SAMPLES);
                
                // 相機畫面壓暗，凸顯煙火高光
                cameraCol *= 0.55;
                
                vec3 finalCol = cameraCol;

                // ==========================================
                // 2. 融入背景煙火 (降低頻率與數量)
                // ==========================================
                vec2 fwCoord = gl_FragCoord.xy / iResolution.y;
                vec3 fwColor = vec3(0.0);
                
                for(int i=0; i < NUM_FIREWORKS; i++) {
                    float fi = float(i);
                    float timeOffset = Period / float(NUM_FIREWORKS) * (0.5 + rand(fi));
                    float time = iTime + fi*timeOffset;
                    float periodTime = mod(time, Period);
                    float periodOffset = fi * 10.0; 
                    float currentPeriod = floor(time/Period + periodOffset);
                    
                    fwColor += firework(fwCoord, currentPeriod, periodTime);
                }
                // 將背景煙火以發光模式疊加
                finalCol = clamp(finalCol + fwColor, 0.0, 1.0);

                // ==========================================
                // 3. 愛心煙火噴發特效 (視覺焦點)
                // ==========================================
                vec2 uv = gl_FragCoord.xy / iResolution.xy;
                uv.x -= 0.5;
                uv.x *= screenAspect;
                uv.y -= 0.5;
                
                vec2 scaled_uv = uv * 2.0;
                vec3 faceFX = vec3(0.0);
                
                // --- 修改：遍歷所有偵測到的臉 ---
                for (int i = 0; i < MAX_FACES; i++) {
                    if (i >= u_faceCount) break; // 超過實際偵測人數則停止

                    // 眼睛煙火
                    vec2 leftEye = transformCoordinates(vec2(1.0 - u_leftEyes.x, u_leftEyes.y), screenAspect, videoAspect);
                    vec2 rightEye = transformCoordinates(vec2(1.0 - u_rightEyes.x, u_rightEyes.y), screenAspect, videoAspect);
                    
                    vec2 scaled_leftEye = leftEye * 2.0;
                    vec2 scaled_rightEye = rightEye * 2.0;
                    
                    faceFX += renderHeartFireworks(scaled_uv, scaled_leftEye, float(i) * 0.1);
                    faceFX += renderHeartFireworks(scaled_uv, scaled_rightEye, float(i) * 0.1 + 0.5);

                    // 嘴巴煙火 (如果張開)
                    if (u_mouthsOpen > 0.5) {
                        vec2 mouth = transformCoordinates(vec2(1.0 - u_mouths.x, u_mouths.y), screenAspect, videoAspect);
                        vec2 scaled_mouth = mouth * 2.0;
                        faceFX += renderHeartFireworks(scaled_uv, scaled_mouth, float(cite: i) * 0.1 + 0.25); 
                    }
                }
                
                finalCol = clamp(finalCol + faceFX, 0.0, 1.0);
                
                // ==========================================
                // 4. 全局畫面暗角 (Vignette)
                // ==========================================
                float vignette = smoothstep(0.75, 0.25, distFromCenter);
                finalCol *= mix(0.3, 1.0, vignette);

                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        function initWebGL() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, antialias: true });
            renderer.setSize(width, height);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            cameraTexture = new THREE.VideoTexture(videoElement);
            cameraTexture.minFilter = THREE.LinearFilter;
            cameraTexture.magFilter = THREE.LinearFilter;

            // --- 修改：更新 Uniforms 結構以匹配 Shader ---
            const uniforms = {
                u_cameraTexture: { value: cameraTexture },
                iResolution: { value: new THREE.Vector2(width, height) },
                u_videoResolution: { value: new THREE.Vector2(1280, 720) }, 
                iTime: { value: 0 },
                u_leftEyes: { value: leftEyesRaw }, //
                u_rightEyes: { value: rightEyesRaw }, //
                u_mouths: { value: mouthsRaw }, //
                u_mouthsOpen: { value: mouthsOpen }, //
                u_faceCount: { value: 0 } //
            };

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            material.uniforms.iResolution.value.set(width, height);
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);
            material.uniforms.iTime.value = timestamp / 1000.0;
            
            // --- 修改：在每一幀更新所有臉部的數據 ---
            material.uniforms.u_leftEyes.value = leftEyesRaw; //
            material.uniforms.u_rightEyes.value = rightEyesRaw; //
            material.uniforms.u_mouths.value = mouthsRaw; //
            material.uniforms.u_mouthsOpen.value = mouthsOpen; //
            material.uniforms.u_faceCount.value = faceCount; //
            
            if (videoElement.videoWidth) {
                material.uniforms.u_videoResolution.value.set(videoElement.videoWidth, videoElement.videoHeight);
            }

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${cite: file}`
        });

        // --- 修改：設置 maxNumFaces 為 MAX_FACES (2) ---
        faceMesh.setOptions({
            maxNumFaces: MAX_FACES, //
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // 嘴巴張開的距離閾值 (根據實際情況微調)
        const MOUTH_OPEN_THRESHOLD = 0.05; 

        // --- 修改：處理多張臉和嘴巴數據 ---
        faceMesh.onResults(results => {
            faceCount = 0;
            // 重置數據
            mouthsOpen.fill(0.0); //

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                faceCount = Math.min(results.multiFaceLandmarks.length, MAX_FACES); //

                for (let i = 0; i < faceCount; i++) {
                    const landmarks = results.multiFaceLandmarks[i]; //
                    
                    // 眼睛 LandMarks (虹膜中心)
                    const leftEye = landmarks; //
                    const rightEye = landmarks; //
                    leftEyesRaw.set(leftEye.x, leftEye.y); //
                    rightEyesRaw.set(rightEye.x, rightEye.y); //

                    // 嘴巴 LandMarks
                    // 13: 上嘴唇內側中心, 14: 下嘴唇內側中心
                    const upperLipInner = landmarks;
                    const lowerLipInner = landmarks;

                    // 計算嘴巴中心位置
                    mouthsRaw.set(
                        (upperLipInner.x + lowerLipInner.x) / 2.0,
                        (upperLipInner.y + lowerLipInner.y) / 2.0
                    );

                    // 計算嘴巴張開距離 (使用歐幾里得距離)
                    const mouthDistance = Math.sqrt(
                        Math.pow(upperLipInner.x - lowerLipInner.x, 2) +
                        Math.pow(upperLipInner.y - lowerLipInner.y, 2) +
                        Math.pow(upperLipInner.z - lowerLipInner.z, 2)
                    );

                    // 判斷嘴巴是否張開
                    if (mouthDistance > MOUTH_OPEN_THRESHOLD) {
                        mouthsOpen = 1.0; 
                    }
                }
            }
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        // --- 攔截自動播放，改為點擊啟動 ---
        let isStarted = false;
        
        startBtn.addEventListener('click', () => {
            if (isStarted) return;
            isStarted = true;
            
            // 點擊後隱藏開始畫面，露出後方的 WebGL 畫布
            startScreen.style.display = 'none';

            // 啟動 WebGL 與相機權限
            initWebGL();
            cameraUtils.start().catch(err => {
                console.error("相機啟動失敗：", err);
                alert("無法啟動相機，請確認您的裝置是否允許相機存取權限。");
                
                // 如果失敗了，把開始畫面顯示回來
                startScreen.style.display = 'flex'; 
                isStarted = false;
            });
        });
        
    </script>
</body>
</html>
